<script>
  try {
    if (localStorage.getItem('momcal_theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');

    var fs = localStorage.getItem('momcal_fontsize');
    if (fs && fs !== 'md') document.documentElement.setAttribute('data-fontsize', fs);
  } catch (e) {}
</script>
