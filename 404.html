<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- v0.0.7: 설정 탭에서 고른 글자 크기를 CSS 로드 전에 미리 적용 / v0.0.8: 다크 모드도 추가
     (다른 정책 페이지 privacy.html/terms.html/contact.html과 동일한 패턴) -->
<script>
  try {
    if (localStorage.getItem('momcal_theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
    var fs = localStorage.getItem('momcal_fontsize');
    if (fs && fs !== 'md') document.documentElement.setAttribute('data-fontsize', fs);
  } catch (e) {}
</script>
<title>페이지를 찾을 수 없어요 | 맘캘 MomCal</title>
<meta name="description" content="찾으시는 페이지가 없어요. 맘캘 MomCal 홈으로 이동해주세요.">
<!-- 404 페이지는 검색엔진에 색인될 필요가 없어서 noindex (다른 정책 페이지는 index, follow) -->
<meta name="robots" content="noindex, follow">
<link rel="icon" href="https://momcal.app/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0&display=block" rel="stylesheet">
<link rel="stylesheet" href="./guide/guide.css">
</head>
<body>

  <a class="g-logo" href="./index.html">맘캘 <img src="./icons/logo-mark.png" alt="" class="brand-mark"></a>

</header>

    </a>
